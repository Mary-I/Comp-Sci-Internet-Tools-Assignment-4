<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Quiz App</title>

  <style>
    /* Basic page styling */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Quiz container box */
    #quiz-container {
      background: #fff;
      border-radius: 16px;
      padding: 30px 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      width: 420px;
      text-align: left;
      position: relative;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-top: 18px;
    }

    /* Timer display */
    #timer {
      position: absolute;
      top: 10px;
      right: 20px;
      font-weight: bold;
      color: #e91e63;
    }

    /* Progress bar area */
    #progress-wrap {
      margin-top: 5px;
      margin-bottom: 18px;
    }

    #progress-text {
      font-size: 14px;
      color: #333;
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    /* Progress bar background */
    #progress-container {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }

    /* Progress bar fill */
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.25s ease;
    }

    /* Answer options */
    label {
      display: block;
      background: #f4f4f4;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
    }

    label:hover {
      background: #e0e0e0;
    }

    input[type="radio"] {
      margin-right: 10px;
    }

    /* Button area */
    #buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 10px;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
      flex: 1;
    }

    button:hover {
      background: #388e3c;
    }

    /* Previous button color */
    #prev-btn {
      background: #607d8b;
    }

    #prev-btn:hover {
      background: #455a64;
    }
  </style>
</head>

<body>

  <div id="quiz-container">

    <!-- Countdown timer -->
    <div id="timer">Time: 60s</div>

    <!-- Progress indicator -->
    <div id="progress-wrap">
      <div id="progress-text">
        <span id="progress-label">Progress</span>
        <span id="progress-count">1 / 4</span>
      </div>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <!-- Question text -->
    <h2 id="question">Question text will go here</h2>

    <!-- Answer choices -->
    <form id="quiz-form">

      <label>
        <input type="radio" name="answer" value="a">
        <span id="option-a">Option A</span>
      </label>

      <label>
        <input type="radio" name="answer" value="b">
        <span id="option-b">Option B</span>
      </label>

      <label>
        <input type="radio" name="answer" value="c">
        <span id="option-c">Option C</span>
      </label>

      <label>
        <input type="radio" name="answer" value="d">
        <span id="option-d">Option D</span>
      </label>

    </form>

    <!-- Navigation buttons -->
    <div id="buttons">
      <button id="prev-btn">Previous</button>
      <button id="next-btn">Next</button>
      <button id="submit-btn">Submit</button>
    </div>

  </div>

  <script>

    /* Quiz questions */
    const quizData = [
      {
        question: "What does HTML stand for?",
        a: "Hyper Text Markup Language",
        b: "HighText Machine Language",
        c: "Hyperlink and Text Markup Language",
        d: "Home Tool Markup Language",
        correct: "a"
      },
      {
        question: "What does CSS stand for?",
        a: "Computer Style Sheets",
        b: "Cascading Style Sheets",
        c: "Creative Style System",
        d: "Colorful Style Syntax",
        correct: "b"
      },
      {
        question: "Which tag is used to include JavaScript in HTML?",
        a: "<javascript>",
        b: "<js>",
        c: "<script>",
        d: "<code>",
        correct: "c"
      },
      {
        question: "Which of the following is not a programming language?",
        a: "Python",
        b: "Java",
        c: "HTML",
        d: "C++",
        correct: "c"
      }
    ];

    /* Shuffle questions randomly */
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    shuffleArray(quizData);

    let currentQuestion = 0;

    /* Store answers so we can go back to them */
    const answers = new Array(quizData.length).fill(null);

    let timeLeft = 60;
    let timerInterval;

    /* Clear selected radio buttons */
    function clearSelections() {
      document.querySelectorAll('input[name="answer"]').forEach(ans => ans.checked = false);
    }

    /* Restore saved answer */
    function setSelection(value) {
      if (!value) return;
      const radio = document.querySelector(`input[name="answer"][value="${value}"]`);
      if (radio) radio.checked = true;
    }

    /* Update progress bar */
    function updateProgress() {
      const total = quizData.length;
      const pos = currentQuestion + 1;
      document.getElementById("progress-count").innerText = `${pos} / ${total}`;
      const percent = (pos / total) * 100;
      document.getElementById("progress-bar").style.width = `${percent}%`;
    }

    /* Load question and answers */
    function loadQuiz() {

      const q = quizData[currentQuestion];

      document.getElementById("question").innerText = q.question;
      document.getElementById("option-a").innerText = q.a;
      document.getElementById("option-b").innerText = q.b;
      document.getElementById("option-c").innerText = q.c;
      document.getElementById("option-d").innerText = q.d;

      clearSelections();
      setSelection(answers[currentQuestion]);

      document.getElementById("prev-btn").disabled = (currentQuestion === 0);

      updateProgress();

    }

    /* Get selected radio answer */
    function getSelectedAnswer() {

      let selected = null;

      document.querySelectorAll('input[name="answer"]').forEach(ans => {
        if (ans.checked) selected = ans.value;
      });

      return selected;

    }

    /* Calculate final score */
    function calculateScore() {

      let score = 0;

      for (let i = 0; i < quizData.length; i++) {
        if (answers[i] && answers[i] === quizData[i].correct) score++;
      }

      return score;

    }

    /* Show final result */
    function showResult(message = "Quiz Completed!") {

      clearInterval(timerInterval);

      const finalScore = calculateScore();

      document.getElementById("quiz-container").innerHTML = `
<h2>${message}</h2>
<p>Your score: <strong>${finalScore}</strong> / ${quizData.length}</p>
<button onclick="location.reload()">Restart Quiz</button>
`;

    }

    /* Go to previous question */
    document.getElementById("prev-btn").addEventListener("click", function (e) {

      e.preventDefault();

      answers[currentQuestion] = getSelectedAnswer();

      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuiz();
      }

    });

    /* Go to next question */
    document.getElementById("next-btn").addEventListener("click", function (e) {

      e.preventDefault();

      const selectedAnswer = getSelectedAnswer();

      if (!selectedAnswer) {
        alert("Please select an answer before moving to the next question!");
        return;
      }

      answers[currentQuestion] = selectedAnswer;

      currentQuestion++;

      if (currentQuestion < quizData.length) {
        loadQuiz();
      }
      else {
        showResult("Quiz Completed!");
      }

    });

    /* Submit quiz early */
    document.getElementById("submit-btn").addEventListener("click", function (e) {

      e.preventDefault();

      answers[currentQuestion] = getSelectedAnswer();

      showResult("Quiz Submitted!");

    });

    /* Start countdown timer */
    function startTimer() {

      document.getElementById("timer").innerText = `Time: ${timeLeft}s`;

      timerInterval = setInterval(() => {

        timeLeft--;

        document.getElementById("timer").innerText = `Time: ${timeLeft}s`;

        if (timeLeft <= 0) {
          showResult("Time's up!");
        }

      }, 1000);

    }

    /* Start quiz when page loads */
    window.onload = function () {

      loadQuiz();
      startTimer();

    }

  </script>

</body>

</html>
